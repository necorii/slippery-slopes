name: Build iOS IPA
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Build Raylib for iOS (The Proper Way)
        run: |
          git clone --depth 1 https://github.com/raysan5/raylib.git
          mkdir -p raylib/build
          cd raylib/build
          # Use CMake to configure specifically for iOS
          cmake .. -DPLATFORM=iOS -DDEPLOYMENT_TARGET=15.0
          # Build only the raylib library
          cmake --build . --target raylib
          
          # Move files to where our project needs them
          mkdir -p ../../lib
          cp raylib/libraylib.a ../../lib/
          cp ../src/raylib.h ../src/raymath.h ../src/rlgl.h ../../
          cd ../../

      - name: Build Binary
        run: |
          # Now compile your game linking against the official iOS build
          xcrun -sdk iphoneos clang main.c -o SlipperySlopes \
            -I. -L./lib -lraylib \
            -Os -Wall -target arm64-apple-ios15.0 \
            -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
            -DPLATFORM_IOS -DGRAPHICS_API_OPENGL_ES2 \
            -framework CoreGraphics -framework UIKit -framework Foundation \
            -framework QuartzCore -framework OpenGLES -framework AudioToolbox -lm

      - name: Package IPA
        run: |
          mkdir -p Payload/SlipperySlopes.app
          mv SlipperySlopes Payload/SlipperySlopes.app/
          cp *.png Payload/SlipperySlopes.app/ 2>/dev/null || true
          cp *.wav Payload/SlipperySlopes.app/ 2>/dev/null || true
          cp *.ttf Payload/SlipperySlopes.app/ 2>/dev/null || true
          zip -r SlipperySlopes.ipa Payload/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SlipperySlopes-iOS-Unsigned
          path: SlipperySlopes.ipa