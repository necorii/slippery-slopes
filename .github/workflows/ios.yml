name: iOS IPA Build\n\n# This workflow builds an unsigned iOS IPA using Raylib for macOS\n\non: [push, pull_request]\n\njobs:\n  build:\n    runs-on: macos-latest\n    steps:\n      - name: Check out code\n        uses: actions/checkout@v2\n      - name: Install Homebrew\n        run: /bin/bash -c '$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)'\n      - name: Install dependencies\n        run: |\n          brew install cmake\n          brew install raylib\n      - name: Build game\n        run: |\n          cd path/to/your/game\n          mkdir build\n          cd build\n          cmake ..\n          make\n      - name: Bundle assets\n        run: |\n          mkdir -p ../MyGame.app/Contents/Resources\n          cp -R assets/* ../MyGame.app/Contents/Resources/\n      - name: Create unsigned IPA\n        run: |\n          xcodebuild -exportArchive -archivePath path/to/archive.xcarchive -exportOptionsPlist path/to/ExportOptions.plist -exportPath path/to/exported\n