name: Build iOS IPA

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Raylib
        run: |
          brew install cmake
          brew install raylib

      - name: Compile main.c
        run: |
          clang -target arm64-apple-ios15.0 \
            -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
            main.c -o SlipperySlopes \
            -I$(brew --prefix raylib)/include \
            -L$(brew --prefix raylib)/lib -lraylib \
            -framework UIKit -framework CoreGraphics -framework AudioToolbox -framework OpenGLES

      - name: Create Info.plist
        run: |
          mkdir -p Payload/SlipperySlopes.app
          cat > Payload/SlipperySlopes.app/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>Slippery Slopes</string>
            <key>CFBundleIdentifier</key>
            <string>com.necorii.slipperyslopes</string>
            <key>CFBundleVersion</key>
            <string>1.0</string>
            <key>CFBundleExecutable</key>
            <string>SlipperySlopes</string>
            <key>UIDeviceFamily</key>
            <array>
              <integer>1</integer>
              <integer>2</integer>
            </array>
            <key>MinimumOSVersion</key>
            <string>15.0</string>
          </dict>
          </plist>
          EOF

      - name: Create app bundle
        run: |
          mv SlipperySlopes Payload/SlipperySlopes.app/
          cp *.png Payload/SlipperySlopes.app/ 2>/dev/null || true
          cp *.wav Payload/SlipperySlopes.app/ 2>/dev/null || true
          cp *.ttf Payload/SlipperySlopes.app/ 2>/dev/null || true

      - name: Package as IPA
        run: |
          cd Payload && zip -r ../SlipperySlopes.ipa SlipperySlopes.app && cd ..

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: SlipperySlopes-Unsigned
          path: SlipperySlopes.ipa