name: Build iOS IPA
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Install Raylib
        run: brew install raylib

      - name: Build Raylib for iOS
        run: |
          # Clone the official Raylib source
          git clone --depth 1 https://github.com/raysan5/raylib.git
          cd raylib/src
          
          # Build it specifically for the iPhone (arm64)
          make PLATFORM=PLATFORM_DRM \
            OS=iOS \
            ARCH=arm64 \
            SDK=iphoneos \
            RAYLIB_LIBTYPE=STATIC \
            -j$(sysctl -n hw.ncpu)
          
          # Move the library to where we can find it
          mkdir -p ../../lib
          cp libraylib.a ../../lib/
          cp raylib.h raymath.h rlgl.h ../../
          cd ../../

      - name: Build Binary
        run: |
          # Now we link against our NEWLY BUILT iOS library (.a)
          # No more 'macOS dylib' drama!
          clang main.c -o SlipperySlopes \
            -I. \
            -L./lib \
            -target arm64-apple-ios15.0 \
            -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
            -framework CoreGraphics \
            -framework UIKit \
            -framework Foundation \
            -framework QuartzCore \
            -framework OpenGLES \
            -framework AudioToolbox \
            -lraylib \
            -lm

      - name: Package IPA
        run: |
          # iOS apps live in a folder called Payload to be a valid IPA
          mkdir -p Payload/SlipperySlopes.app
          
          # Move the binary and ALL your assets into the app bundle
          cp SlipperySlopes Payload/SlipperySlopes.app/
          cp *.png Payload/SlipperySlopes.app/ 2>/dev/null || true
          cp *.wav Payload/SlipperySlopes.app/ 2>/dev/null || true
          cp *.ttf Payload/SlipperySlopes.app/ 2>/dev/null || true
          
          # Zip it up!
          zip -r SlipperySlopes.ipa Payload/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SlipperySlopes-iOS-Unsigned
          path: SlipperySlopes.ipa