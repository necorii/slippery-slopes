name: build for ios
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: make my library right now please
        run: |
          git clone --depth 1 https://github.com/raysan5/raylib.git
          cd raylib/src
          
          # We use the Raylib Makefile but force the iOS flags manually
          # This avoids the CMake "Unknown Platform" drama
          make PLATFORM=PLATFORM_DRM \
            OS=iOS \
            ARCH=arm64 \
            SDK=iphoneos \
            RAYLIB_LIBTYPE=STATIC \
            -j$(sysctl -n hw.ncpu) || true 
            
          # The '|| true' is because the full build might 'fail' on examples, 
          # but we only need the libraylib.a file which builds first!
          
          mkdir -p ../../lib
          cp libraylib.a ../../lib/ 2>/dev/null || cp libraylib.a ../../lib/ || echo "Searching for lib..."
          cp raylib.h raymath.h rlgl.h ../../
          cd ../../

      - name: Build THE IPA OR I TURN YOU INTO DUST
        run: |
          # Link against the library we just forced into existence
          xcrun -sdk iphoneos clang main.c -o SlipperySlopes \
            -I. -L./lib -lraylib \
            -Os -Wall -target arm64-apple-ios15.0 \
            -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
            -DPLATFORM_IOS -DGRAPHICS_API_OPENGL_ES2 \
            -framework CoreGraphics -framework UIKit -framework Foundation \
            -framework QuartzCore -framework OpenGLES -framework AudioToolbox -lm

      - name: Package IPA OR I TURN YOU INTO DUST
        run: |
          mkdir -p Payload/SlipperySlopes.app
          mv SlipperySlopes Payload/SlipperySlopes.app/
          # Copy assets if they exist
          cp *.png Payload/SlipperySlopes.app/ 2>/dev/null || true
          cp *.wav Payload/SlipperySlopes.app/ 2>/dev/null || true
          zip -r SlipperySlopes.ipa Payload/

      - name: Upload IPA OR I TURN YOU INTO DUST
        uses: actions/upload-artifact@v4
        with:
          name: SlipperySlopes-iOS-Unsigned
          path: SlipperySlopes.ipa